    <!-- Box scene -->
    <div id="box-scene">
      <div class="flagbar">
        <p class="flagbar__text">Whatever could be inside?</p>
      </div>
      <div id="box-wrapper" class="box-wrapper">
        <div id="box" class="box">
          <div id="box-body" class="face front"></div>
          <div class="face right"></div>
          <div class="face left"></div>
          <div id="box-lid" class="face top"></div>
          <div class="face bottom"></div>
        </div>
      </div>
     
    </div>
